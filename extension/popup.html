<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Boss 岗位助手</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2937;
      background: #ffffff;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 20px;
      line-height: 1.3;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #374151;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 12px;
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 10px 12px;
      border: 0;
      border-radius: 6px;
      font-size: 14px;
      color: #ffffff;
      background: #16a34a;
      cursor: pointer;
    }

    button:hover {
      background: #15803d;
    }

    #status {
      margin-top: 12px;
      font-size: 13px;
      line-height: 1.5;
      color: #4b5563;
    }
  </style>
</head>
<body>
  <h1>Boss 岗位助手</h1>
  <label for="pages">采集页数</label>
  <input id="pages" type="number" min="1" max="3" value="1">
  <button id="collect" type="button">采集并导出 Excel</button>
  <div id="status">请先启动本地服务，并打开 Boss 搜索结果页。</div>
  <script src="popup.js"></script>
</body>
</html>
