<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>求职助手</title>
  <style>
    body {
      width: 340px;
      margin: 0;
      padding: 16px;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #172033;
      background: #ffffff;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 19px;
      line-height: 1.3;
    }

    .actions {
      display: grid;
      gap: 8px;
    }

    button {
      width: 100%;
      padding: 10px 12px;
      border: 0;
      border-radius: 6px;
      font-size: 14px;
      color: #ffffff;
      background: #0f766e;
      cursor: pointer;
    }

    button.secondary {
      color: #172033;
      background: #e5e7eb;
    }

    button.danger {
      background: #b91c1c;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    button:hover:not(:disabled) {
      filter: brightness(0.95);
    }

    #status {
      margin-top: 12px;
      font-size: 13px;
      line-height: 1.5;
      color: #4b5563;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h1>求职助手</h1>
  <div class="actions">
    <button id="save" type="button">收藏当前岗位</button>
    <button id="unsave" class="danger" type="button">取消收藏当前岗位</button>
    <button id="dashboard" class="secondary" type="button">打开职位库</button>
  </div>
  <div id="status">先在 Boss 手动点开一个岗位详情，再点击收藏。</div>
  <script src="popup.js"></script>
</body>
</html>
